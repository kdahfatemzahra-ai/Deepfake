<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login · DeepShield</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0a0b;
  --surface: #111113;
  --surface-raised: #18181b;
  --border: #27272a;
  --border-light: #3f3f46;
  --text: #fafafa;
  --text-muted: #71717a;
  --accent: #7c3aed;
  --accent-light: #8b5cf6;
  --red: #ef4444;
  --red-dim: rgba(239,68,68,.12);
  --radius: 12px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}
.auth-card {
  width: 100%;
  max-width: 400px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 40px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}
.header { text-align: center; margin-bottom: 32px; }
.logo {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
  font-size: 20px;
  margin-bottom: 12px;
}
.logo-dot { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; }
.title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
.subtitle { color: var(--text-muted); font-size: 14px; }

.form-group { margin-bottom: 20px; }
.label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 8px; color: var(--text-muted); }
.input {
  width: 100%;
  background: var(--surface-raised);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  transition: border-color 0.2s;
}
.input:focus { outline: none; border-color: var(--accent-light); }

.btn {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}
.btn:hover { background: var(--accent-light); }

.alert {
  padding: 12px;
  background: var(--red-dim);
  border: 1px solid var(--red);
  border-radius: 8px;
  color: var(--red);
  font-size: 13px;
  margin-bottom: 24px;
  text-align: center;
}
.footer-link {
  text-align: center;
  margin-top: 24px;
  font-size: 13px;
  color: var(--text-muted);
}
.footer-link a { color: var(--accent-light); text-decoration: none; font-weight: 500; }
.footer-link a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="auth-card">
    <div class="header">
      <div class="logo"><div class="logo-dot"></div>DeepShield</div>
      <h1 class="title">Welcome back</h1>
      <p class="subtitle">Please enter your details</p>
    </div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label class="label">Username</label>
        <input type="text" name="username" class="input" placeholder="Enter your username" required autofocus>
      </div>
      <div class="form-group">
        <label class="label">Password</label>
        <input type="password" name="password" class="input" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>

    <div class="footer-link">
      Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
    </div>
  </div>
</body>
</html>
