<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DeepShield</title>
<style>
/* ── Design tokens ── */
:root {
  --bg:        #F2F2F7;
  --surface:   #FFFFFF;
  --fill:      rgba(118,118,128,.12);
  --fill2:     rgba(118,118,128,.20);
  --sep:       rgba(0,0,0,.09);
  --sep-s:     rgba(0,0,0,.06);
  --text:      #1D1D1F;
  --text2:     #6E6E73;
  --text3:     #AEAEB2;
  --blue:      #007AFF;
  --blue-h:    #0071E3;
  --blue-bg:   rgba(0,122,255,.1);
  --green:     #34C759;
  --green-bg:  rgba(52,199,89,.12);
  --red:       #FF3B30;
  --red-bg:    rgba(255,59,48,.12);
  --nav-bg:    rgba(242,242,247,.88);
  --r12:       12px;
  --r16:       16px;
  --r20:       20px;
  --shadow:    0 1px 0 rgba(0,0,0,.04),0 4px 24px rgba(0,0,0,.07);
  --shadow-lg: 0 2px 4px rgba(0,0,0,.04),0 16px 48px rgba(0,0,0,.1);
}

/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;-webkit-font-smoothing:antialiased;
  font-size:15px;line-height:1.5;
}

/* ── Navbar ── */
nav{
  position:sticky;top:0;z-index:100;
  height:52px;
  background:var(--nav-bg);
  backdrop-filter:saturate(180%) blur(24px);
  -webkit-backdrop-filter:saturate(180%) blur(24px);
  border-bottom:.5px solid var(--sep);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
}
.brand{
  display:flex;align-items:center;gap:9px;
  font-size:17px;font-weight:600;letter-spacing:-.3px;color:var(--text);
  text-decoration:none;
}
.brand-icon{
  width:30px;height:30px;
  background:var(--blue);border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.nav-right{display:flex;align-items:center;gap:14px}
.nav-user{font-size:13px;font-weight:500;color:var(--text2)}
.nav-divider{width:.5px;height:16px;background:var(--sep)}
.nav-link{
  font-size:13px;font-weight:500;color:var(--blue);
  background:none;border:none;cursor:pointer;font-family:inherit;padding:0;
}
.nav-link:hover{opacity:.7}
.nav-history{
  display:flex;align-items:center;gap:5px;
  font-size:13px;font-weight:500;color:var(--text2);
  background:none;border:none;cursor:pointer;font-family:inherit;padding:0;
}
.nav-history:hover{color:var(--text)}

/* ── Page layout ── */
.page{max-width:560px;margin:0 auto;padding:32px 20px 100px}

/* ── Drop zone ── */
.dropzone{
  background:var(--surface);
  border-radius:var(--r20);
  box-shadow:var(--shadow);
  padding:56px 32px 52px;
  text-align:center;cursor:pointer;
  transition:box-shadow .2s,border-color .2s;
  border:1.5px dashed transparent;
  position:relative;
}
.dropzone:hover{box-shadow:var(--shadow-lg)}
.dropzone.drag-over{
  border-color:var(--blue);
  background:linear-gradient(to bottom,rgba(0,122,255,.03),var(--surface));
  box-shadow:0 0 0 4px rgba(0,122,255,.12),var(--shadow-lg);
}
.dz-icon{
  width:76px;height:76px;
  background:var(--blue-bg);
  border-radius:22px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 24px;
  transition:transform .2s;
}
.dropzone:hover .dz-icon{transform:scale(1.05) translateY(-2px)}
.dz-title{font-size:19px;font-weight:600;letter-spacing:-.4px;margin-bottom:7px}
.dz-sub{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:28px}

/* ── Buttons ── */
.btn-primary{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  padding:11px 24px;
  background:var(--blue);color:#fff;
  border:none;border-radius:980px;
  font-family:inherit;font-size:15px;font-weight:500;
  cursor:pointer;transition:background .15s,transform .1s,box-shadow .15s;
}
.btn-primary:hover{background:var(--blue-h);box-shadow:0 4px 14px rgba(0,122,255,.3)}
.btn-primary:active{transform:scale(.97)}
.btn-primary.full{width:100%;padding:13px 24px;border-radius:12px}

.btn-secondary{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:9px 20px;
  background:var(--fill);color:var(--text);
  border:none;border-radius:980px;
  font-family:inherit;font-size:14px;font-weight:500;
  cursor:pointer;transition:background .15s,transform .1s;
}
.btn-secondary:hover{background:var(--fill2)}
.btn-secondary:active{transform:scale(.97)}

.btn-ghost{
  display:inline-flex;align-items:center;
  padding:6px 14px;
  background:none;
  border:1px solid var(--sep);
  border-radius:980px;
  font-family:inherit;font-size:13px;font-weight:500;color:var(--text2);
  cursor:pointer;transition:background .15s,color .15s;
}
.btn-ghost:hover{background:var(--fill);color:var(--text)}

/* ── Analysis card ── */
.a-card{
  display:none;
  background:var(--surface);
  border-radius:var(--r20);
  box-shadow:var(--shadow);
  overflow:hidden;
}

/* Preview pane */
.preview-pane{
  background:#000;
  position:relative;
  min-height:160px;max-height:260px;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
#pi,#pv{
  max-width:100%;max-height:260px;
  object-fit:contain;display:none;
}
#hi{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:contain;opacity:0;
  transition:opacity .3s ease;pointer-events:none;display:none;
}

/* Segmented overlay control */
.seg{
  position:absolute;top:12px;right:12px;
  display:none;
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-radius:980px;padding:3px;gap:2px;
}
.seg-btn{
  padding:5px 14px;border-radius:980px;border:none;
  background:transparent;color:rgba(255,255,255,.65);
  font-family:inherit;font-size:12px;font-weight:500;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.seg-btn.on{background:rgba(255,255,255,.22);color:#fff}

/* Card sections */
.cs{padding:20px 24px;border-top:.5px solid var(--sep-s)}
.cs:first-child{border-top:none}

/* File row */
.file-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.file-info{min-width:0}
.file-name{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-meta{font-size:12px;color:var(--text2);margin-top:2px}

/* Loading */
.loading-pane{text-align:center;padding:48px 24px;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{
  width:34px;height:34px;
  border:2.5px solid rgba(0,0,0,.1);
  border-top-color:var(--blue);
  border-radius:50%;
  animation:spin .75s linear infinite;
  margin:0 auto 18px;
}
.loading-t{font-size:15px;font-weight:600;margin-bottom:4px}
.loading-s{font-size:13px;color:var(--text2)}

/* Verdict */
.verdict-pane{display:none}

.v-row{display:flex;align-items:center;justify-content:space-between;gap:16px}
.v-left{display:flex;align-items:center;gap:14px}
.v-chip{
  width:50px;height:50px;flex-shrink:0;
  border-radius:15px;
  display:flex;align-items:center;justify-content:center;
}
.v-chip.fake{background:var(--red-bg)}
.v-chip.real{background:var(--green-bg)}
.v-label{font-size:24px;font-weight:700;letter-spacing:-.6px}
.v-label.fake{color:var(--red)}
.v-label.real{color:var(--green)}
.v-file{font-size:13px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.v-right{text-align:right;flex-shrink:0}
.v-pct{font-size:32px;font-weight:700;letter-spacing:-1.5px;line-height:1}
.v-pct-lbl{font-size:11px;color:var(--text2);margin-top:4px;font-weight:500;letter-spacing:.1px}

/* Prob bar */
.prob-row{display:flex;align-items:center;gap:11px;margin-top:20px}
.prob-lbl{font-size:12px;color:var(--text2);white-space:nowrap}
.prob-track{flex:1;height:4px;background:var(--fill);border-radius:999px;overflow:hidden}
.prob-fill{height:100%;border-radius:999px;width:0;transition:width .9s cubic-bezier(.34,1.56,.64,1)}
.prob-val{font-size:12px;font-weight:600;width:34px;text-align:right;flex-shrink:0}

/* Score breakdown */
.scores-hd{
  font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:.6px;
  color:var(--text3);margin-bottom:16px;
}
.score-row{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.score-row:last-child{margin-bottom:0}
.score-name{font-size:13px;color:var(--text2);width:86px;flex-shrink:0}
.score-track{flex:1;height:3px;background:var(--fill);border-radius:999px;overflow:hidden}
.score-fill{height:100%;border-radius:999px;width:0;transition:width .7s ease}
.score-val{font-size:12px;font-weight:600;width:34px;text-align:right;flex-shrink:0}

/* Footer row */
.foot-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.foot-meta{font-size:12px;color:var(--text3);line-height:1.5}

/* ── History drawer ── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0);
  pointer-events:none;z-index:200;
  transition:background .3s;
}
.overlay.on{background:rgba(0,0,0,.25);pointer-events:all}

.drawer{
  position:fixed;top:0;right:0;bottom:0;
  width:320px;
  background:var(--bg);
  transform:translateX(100%);
  transition:transform .35s cubic-bezier(.32,.72,0,1);
  z-index:201;display:flex;flex-direction:column;
  box-shadow:-2px 0 24px rgba(0,0,0,.08),-20px 0 60px rgba(0,0,0,.1);
}
.drawer.on{transform:translateX(0)}
.drawer-hd{
  height:52px;display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;flex-shrink:0;
  background:var(--nav-bg);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:.5px solid var(--sep);
}
.drawer-title{font-size:17px;font-weight:600}
.drawer-close{
  width:30px;height:30px;border-radius:50%;border:none;
  background:var(--fill);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text2);transition:background .15s;
}
.drawer-close:hover{background:var(--fill2)}
.drawer-body{flex:1;overflow-y:auto;padding:12px;
  /* hide scrollbar */
  scrollbar-width:none;
}
.drawer-body::-webkit-scrollbar{display:none}

.h-empty{text-align:center;padding:64px 20px;color:var(--text2);font-size:14px}
.h-item{
  padding:14px 16px;
  background:var(--surface);
  border-radius:var(--r12);
  margin-bottom:8px;
  cursor:default;
  transition:box-shadow .15s;
}
.h-item:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.h-date{font-size:11px;color:var(--text3);margin-bottom:4px}
.h-name{font-size:14px;font-weight:500;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.h-tag{
  display:inline-flex;align-items:center;gap:5px;
  font-size:12px;font-weight:600;
  padding:3px 9px;border-radius:980px;
}
.h-tag.fake{background:var(--red-bg);color:var(--red)}
.h-tag.real{background:var(--green-bg);color:var(--green)}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .3s ease both}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fadein{animation:fadeIn .25s ease both}
</style>
</head>
<body>

<!-- Navbar -->
<nav>
  <a class="brand" href="#">
    <div class="brand-icon">
      <svg width="17" height="17" viewBox="0 0 17 17" fill="none">
        <path d="M8.5 1L2 4.5v5c0 3.6 2.8 7 6.5 7.7C12.2 16.5 15 13.1 15 9.5v-5L8.5 1z" fill="white"/>
      </svg>
    </div>
    DeepShield
  </a>
  <div class="nav-right">
    <button class="nav-history" onclick="openHistory()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.3"/>
        <path d="M7 4v3l2 1.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      History
    </button>
    <div class="nav-divider"></div>
    <span class="nav-user">{{ username }}</span>
    <div class="nav-divider"></div>
    <a href="{{ url_for('logout') }}" class="nav-link">Sign out</a>
  </div>
</nav>

<div class="page">

  <!-- ── Drop zone ── -->
  <div id="dz" class="dropzone"
    ondragover="dzOver(event)" ondragleave="dzLeave()" ondrop="dzDrop(event)">
    <div class="dz-icon">
      <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
        <path d="M17 22V12M17 12L13 16M17 12L21 16" stroke="#007AFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M25 26H9M6 21a7 7 0 0 1 2.3-13.3A9 9 0 0 1 26 10.5a7 7 0 0 1 2 4.8" stroke="#007AFF" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="dz-title">Drop your file here</div>
    <div class="dz-sub">Images or videos — JPG, PNG, WEBP,<br>GIF, MP4, MOV and more</div>
    <button class="btn-primary" onclick="event.stopPropagation();pickFile()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1v8M4 4l3-3 3 3M1 11v1a2 2 0 002 2h8a2 2 0 002-2v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Choose File
    </button>
    <input id="fi" type="file" accept="image/*,video/*" style="display:none" onchange="onPick(event)"/>
  </div>

  <!-- ── Analysis card ── -->
  <div id="ac" class="a-card">

    <!-- Preview -->
    <div class="preview-pane" id="pp">
      <img id="pi"/>
      <video id="pv" controls muted playsinline></video>
      <img id="hi"/>
      <div class="seg" id="seg">
        <button class="seg-btn on" id="seg-a" onclick="setHeatmap(false)">Original</button>
        <button class="seg-btn"    id="seg-b" onclick="setHeatmap(true)">ELA</button>
      </div>
    </div>

    <!-- File info -->
    <div class="cs" id="s-file">
      <div class="file-row">
        <div class="file-info">
          <div class="file-name" id="fname">—</div>
          <div class="file-meta" id="fmeta">Image · ready to analyse</div>
        </div>
        <button class="btn-ghost" onclick="resetApp()">Change</button>
      </div>
      <div style="margin-top:16px">
        <button class="btn-primary full" id="btn-go">Analyse</button>
      </div>
    </div>

    <!-- Loading -->
    <div class="loading-pane" id="s-load">
      <div class="spinner"></div>
      <div class="loading-t">Analysing…</div>
      <div class="loading-s">Running forensic pipeline</div>
    </div>

    <!-- Verdict + results -->
    <div class="verdict-pane" id="s-res">

      <!-- Verdict row -->
      <div class="cs">
        <div class="v-row">
          <div class="v-left">
            <div class="v-chip" id="v-chip"></div>
            <div>
              <div class="v-label" id="v-lbl"></div>
              <div class="v-file" id="v-file"></div>
            </div>
          </div>
          <div class="v-right">
            <div class="v-pct" id="v-pct"></div>
            <div class="v-pct-lbl">confidence</div>
          </div>
        </div>
        <!-- Fake probability bar -->
        <div class="prob-row">
          <span class="prob-lbl">Fake probability</span>
          <div class="prob-track"><div class="prob-fill" id="pfill"></div></div>
          <span class="prob-val" id="pval"></span>
        </div>
      </div>

      <!-- Signal breakdown -->
      <div class="cs">
        <div class="scores-hd">Signal breakdown</div>
        <div id="srows"></div>
      </div>

      <!-- Footer -->
      <div class="cs foot-row">
        <div class="foot-meta" id="fmeta2"></div>
        <button class="btn-secondary" onclick="resetApp()">New Analysis</button>
      </div>

    </div>
  </div>

</div>

<!-- ── Drawer ── -->
<div class="overlay" id="ov" onclick="closeHistory()"></div>
<div class="drawer" id="dr">
  <div class="drawer-hd">
    <span class="drawer-title">History</span>
    <button class="drawer-close" onclick="closeHistory()">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
        <path d="M1 1l8 8M9 1L1 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <div class="drawer-body" id="dbody"></div>
</div>

<script>
'use strict';
let file = null;

/* ─ Drop zone ─ */
const dz = document.getElementById('dz');
dz.onclick = pickFile;
function pickFile(){ document.getElementById('fi').click() }
function onPick(e){ if(e.target.files[0]) loadFile(e.target.files[0]) }
function dzOver(e){ e.preventDefault(); dz.classList.add('drag-over') }
function dzLeave(){ dz.classList.remove('drag-over') }
function dzDrop(e){ e.preventDefault(); dz.classList.remove('drag-over'); if(e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]) }

/* ─ Load file ─ */
function loadFile(f){
  file = f;
  dz.style.display = 'none';
  const ac = document.getElementById('ac');
  ac.style.display = 'block';
  ac.classList.add('anim');

  const isVid = f.type.startsWith('video');
  document.getElementById('fname').textContent = f.name;
  document.getElementById('fmeta').textContent = (isVid ? 'Video' : 'Image') + ' · ready to analyse';

  const url = URL.createObjectURL(f);
  const pi = document.getElementById('pi');
  const pv = document.getElementById('pv');
  if(isVid){ pv.src=url; pv.style.display='block'; pi.style.display='none' }
  else{ pi.src=url; pi.style.display='block'; pv.style.display='none' }

  show('s-file'); hide('s-load'); hide('s-res'); hide('seg');
}

/* ─ Analyse ─ */
document.getElementById('btn-go').onclick = async () => {
  hide('s-file'); show('s-load');
  const fd = new FormData(); fd.append('file', file);
  try {
    const r = await fetch('/analyze',{method:'POST',body:fd});
    const d = await r.json();
    hide('s-load');
    if(d.error){ alert(d.error); resetApp() } else render(d.result)
  } catch{ alert('Analysis failed. Please try again.'); resetApp() }
};

/* ─ Render result ─ */
function render(r){
  const fake = r.label === 'FAKE';
  const C = fake ? 'var(--red)' : 'var(--green)';

  // Chip
  const chip = document.getElementById('v-chip');
  chip.className = 'v-chip ' + (fake?'fake':'real');
  chip.innerHTML = fake
    ? `<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="${fake?'#FF3B30':'#34C759'}" stroke-width="1.8"/><path d="M12 8v4M12 15.5h.01" stroke="${fake?'#FF3B30':'#34C759'}" stroke-width="2" stroke-linecap="round"/></svg>`
    : `<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#34C759" stroke-width="1.8"/><path d="M8.5 12l3 3 4-5" stroke="#34C759" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

  // Labels
  el('v-lbl').textContent = r.label;
  el('v-lbl').className = 'v-label ' + (fake?'fake':'real');
  el('v-file').textContent = r.filename || '';

  // Confidence
  el('v-pct').textContent = r.confidence + '%';
  el('v-pct').style.color = C;

  // Probability bar — animate after paint
  el('pval').textContent = r.fake_probability + '%';
  el('pval').style.color = C;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    el('pfill').style.width = r.fake_probability + '%';
    el('pfill').style.background = C;
  }));

  // Signal rows — stagger
  const entries = Object.entries(r.individual_scores || {});
  el('srows').innerHTML = entries.map(([k,v])=>`
    <div class="score-row fadein">
      <span class="score-name">${k}</span>
      <div class="score-track"><div class="score-fill" id="sf-${k.replace(/\s/g,'_')}" style="background:${v>50?'var(--red)':'var(--blue)'}"></div></div>
      <span class="score-val" style="color:${v>50?'var(--red)':'var(--text2)'}">${v}%</span>
    </div>
  `).join('');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    entries.forEach(([k,v])=>{
      const sf = document.getElementById('sf-'+k.replace(/\s/g,'_'));
      if(sf) sf.style.width = v+'%';
    });
  }));

  // Heatmap
  const hm = document.getElementById('hi');
  if(r.heatmap_url){
    hm.src = r.heatmap_url;
    hm.style.display = 'block';
    hm.style.opacity = 0;
    el('seg-a').classList.add('on'); el('seg-b').classList.remove('on');
    document.getElementById('seg').style.display = 'flex';
  }

  // Meta
  el('fmeta2').innerHTML = `Processed in <b>${r.processing_ms}ms</b><br>${r.model}`;

  // Show
  show('s-res');
  el('s-res').classList.add('anim');
}

function setHeatmap(on){
  document.getElementById('hi').style.opacity = on?1:0;
  el('seg-a').classList.toggle('on',!on);
  el('seg-b').classList.toggle('on', on);
}

/* ─ Reset ─ */
function resetApp(){
  file = null;
  dz.style.display = 'block';
  document.getElementById('ac').style.display = 'none';
  document.getElementById('hi').style.display = 'none';
  document.getElementById('hi').style.opacity = 0;
  document.getElementById('fi').value = '';
}

/* ─ History ─ */
function openHistory(){
  el('ov').classList.add('on'); el('dr').classList.add('on');
  loadHistory();
}
function closeHistory(){ el('ov').classList.remove('on'); el('dr').classList.remove('on') }

async function loadHistory(){
  const r = await fetch('/history');
  const d = await r.json();
  const b = el('dbody');
  if(!d.history||!d.history.length){ b.innerHTML='<div class="h-empty">No analyses yet</div>'; return }
  b.innerHTML = d.history.map(h=>{
    const dt = new Date(h.timestamp);
    const fmt = dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
              + ' · ' + dt.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    const v = h.verdict.toLowerCase();
    return `<div class="h-item">
      <div class="h-date">${fmt}</div>
      <div class="h-name">${h.filename}</div>
      <span class="h-tag ${v}">${h.verdict} · ${h.confidence}%</span>
    </div>`;
  }).join('');
}

/* ─ Helpers ─ */
function el(id){ return document.getElementById(id) }
function show(id){ el(id).style.display='block' }
function hide(id){ el(id).style.display='none' }
</script>
</body>
</html>
