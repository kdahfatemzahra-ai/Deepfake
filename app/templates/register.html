<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Create account · DeepShield</title>
<style>
:root {
  --bg:       #F2F2F7;
  --surface:  #FFFFFF;
  --fill:     rgba(118,118,128,.12);
  --sep:      rgba(0,0,0,.1);
  --text:     #1D1D1F;
  --text2:    #6E6E73;
  --text3:    #AEAEB2;
  --blue:     #007AFF;
  --blue-h:   #0071E3;
  --red:      #FF3B30;
  --red-bg:   rgba(255,59,48,.1);
  --green:    #34C759;
  --green-bg: rgba(52,199,89,.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px;-webkit-font-smoothing:antialiased;
}
.card{
  width:100%;max-width:380px;
  background:var(--surface);
  border-radius:20px;
  box-shadow:0 2px 8px rgba(0,0,0,.06),0 16px 48px rgba(0,0,0,.08);
  overflow:hidden;
}
.card-top{
  padding:40px 36px 32px;
  text-align:center;
  border-bottom:.5px solid var(--sep);
}
.logo{
  width:60px;height:60px;
  background:var(--blue);
  border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 22px;
  box-shadow:0 4px 20px rgba(0,122,255,.3);
}
.card-title{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px}
.card-sub{font-size:14px;color:var(--text2)}
.card-body{padding:28px 36px 36px}

.alert{
  padding:12px 14px;border-radius:10px;
  font-size:13px;font-weight:500;margin-bottom:20px;
}
.alert-error{background:var(--red-bg);color:var(--red)}
.alert-success{background:var(--green-bg);color:var(--green)}

.field{margin-bottom:16px}
.field-label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:7px}
.field-input{
  width:100%;padding:12px 14px;
  background:var(--bg);
  border:1px solid rgba(0,0,0,.15);
  border-radius:10px;
  font-family:inherit;font-size:15px;color:var(--text);
  -webkit-appearance:none;
  transition:border-color .15s,box-shadow .15s;
}
.field-input::placeholder{color:var(--text3)}
.field-input:focus{
  outline:none;
  border-color:var(--blue);
  box-shadow:0 0 0 3.5px rgba(0,122,255,.15);
}
.btn{
  width:100%;padding:13px;
  background:var(--blue);color:#fff;
  border:none;border-radius:10px;
  font-family:inherit;font-size:15px;font-weight:600;
  cursor:pointer;margin-top:4px;
  transition:background .15s,transform .1s;
}
.btn:hover{background:var(--blue-h)}
.btn:active{transform:scale(.99)}
.footer{
  text-align:center;margin-top:20px;
  font-size:13px;color:var(--text2);
}
.footer a{color:var(--blue);text-decoration:none;font-weight:500}
.footer a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="card">
  <div class="card-top">
    <div class="logo">
      <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
        <path d="M15 2L3 8v7c0 6.4 4.9 12.4 12 13.9C22.1 27.4 27 21.4 27 15V8L15 2z" fill="white"/>
      </svg>
    </div>
    <div class="card-title">Create account</div>
    <div class="card-sub">Join DeepShield</div>
  </div>
  <div class="card-body">
    {% with messages = get_flashed_messages() %}
      {% if messages %}{% for m in messages %}
        <div class="alert {% if 'successful' in m %}alert-success{% else %}alert-error{% endif %}">{{ m }}</div>
      {% endfor %}{% endif %}
    {% endwith %}
    <form method="POST">
      <div class="field">
        <label class="field-label">Username</label>
        <input class="field-input" type="text" name="username" placeholder="Choose a username" required autofocus autocomplete="username">
      </div>
      <div class="field">
        <label class="field-label">Password</label>
        <input class="field-input" type="password" name="password" placeholder="Create a password" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn">Create Account</button>
    </form>
    <div class="footer">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></div>
  </div>
</div>
</body>
</html>
